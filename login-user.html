<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Toko</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="logo-linkify.png">
  <link rel="apple-touch-icon" href="logo-linkify.png">
</head>
<body class="login-page">
  <div class="earth-card" style="width:100%;max-width:400px;padding:32px;animation:fadeIn 0.6s ease-out;">
    <div style="display:flex;justify-content:center;margin-bottom:24px;">
      <div class="login-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7"/>
          <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
          <path d="M15 22v-4a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4"/>
          <path d="M2 7h20"/>
          <path d="M22 7v3a2 2 0 0 1-2 2v0a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 16 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 12 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 8 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 4 12v0a2 2 0 0 1-2-2V7"/>
        </svg>
      </div>
    </div>
    <h1 class="login-title">Login Toko Kamu</h1>
    <p class="login-sub">Masuk untuk kelola produk & toko</p>
    <div class="login-fields">
      <div>
        <label class="login-label">Email</label>
        <input id="email" type="email" autocomplete="email" placeholder="email@tokokamu.com" class="login-input">
      </div>
      <div>
        <label class="login-label">Password</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" class="login-input">
      </div>
    </div>
    <button type="button" id="loginBtn" class="login-btn">Masuk</button>
    <p id="errorMsg" class="login-error"></p>
  </div>

  <script type="module">
    import { checkMaintenance } from './js/maintenance.js';
    await checkMaintenance(); // login page juga kena maintenance
  </script>
  <script type="module" src="js/login-user.js"></script>
</body>
</html>
