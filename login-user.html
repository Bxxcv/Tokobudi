<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Toko</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="logo-linkify.png">
  <link rel="apple-touch-icon" href="logo-linkify.png">
</head>
<body class="w-full px-4 py-4 text-base flex items-center justify-center min-h-screen bg-[#F4F4F4]">
  <div class="earth-card w-full max-w-sm p-8" style="animation: fadeIn 0.6s ease-out;">
    <div class="flex justify-center mb-6">
      <div class="w-14 h-14 bg-black rounded-2xl flex items-center justify-center text-white">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7"/>
          <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
          <path d="M15 22v-4a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4"/>
          <path d="M2 7h20"/>
          <path d="M22 7v3a2 2 0 0 1-2 2v0a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 16 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 12 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 8 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 4 12v0a2 2 0 0 1-2-2V7"/>
        </svg>
      </div>
    </div>
    <h1 class="font-bold text-2xl text-center mb-1 text-gray-900">Login Toko Kamu</h1>
    <p class="text-center text-gray-400 text-xs mb-8">Masuk untuk kelola produk & toko</p>
    <div class="space-y-4">
      <div><label class="text-xs text-gray-400 mb-1 block">Email</label><input id="email" type="email" autocomplete="email" placeholder="email@tokokamu.com" class="p-3.5 rounded-xl w-full text-sm"></div>
      <div><label class="text-xs text-gray-400 mb-1 block">Password</label><input id="password" type="password" autocomplete="current-password" placeholder="••••••••" class="p-3.5 rounded-xl w-full text-sm"></div>
    </div>
    <button type="button" id="loginBtn" class="w-full mt-6 py-3.5 rounded-xl font-semibold text-sm bg-black text-white hover:bg-gray-800 transition-all">Masuk</button>
    <p id="errorMsg" class="text-red-500 text-xs text-center mt-4 h-4"></p>
  </div>

  <script type="module" src="js/login-user.js"></script>
</body>
</html>
