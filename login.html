<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="w-full px-4 py-4 text-base flex items-center justify-center min-h-screen bg-[#F9F6F1]">
  <div class="earth-card w-full max-w-sm rounded-3xl p-8 border-b-4 border-[#3E2723]" style="animation: fadeIn 0.6s ease-out;">
    <div class="flex justify-center mb-6">
      <div class="w-16 h-16 bg-[#3E2723] rounded-2xl flex items-center justify-center text-white">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
      </div>
    </div>
    <h1 class="font-extrabold text-3xl text-center mb-2 tracking-tight text-[#3E2723]">Admin Access</h1>
    <p class="text-center text-stone-400 text-sm mb-8">Masuk untuk mengelola toko</p>
    <div class="space-y-4">
      <div><label class="text-sm text-stone-500 mb-1 block">Email Address</label><input id="email" type="email" placeholder="admin@email.com" class="p-4 rounded-xl w-full text-sm"></div>
      <div><label class="text-sm text-stone-500 mb-1 block">Password</label><input id="password" type="password" placeholder="••••••••" class="p-4 rounded-xl w-full text-sm"></div>
    </div>
    <button id="loginBtn" class="w-full mt-6 py-4 rounded-2xl font-bold text-sm bg-[#3E2723] text-white shadow-lg hover:bg-[#5D4037] transition-all flex items-center justify-center gap-2">Masuk ke Dashboard</button>
    <p id="errorMsg" class="text-red-600 text-xs text-center mt-4 h-4"></p>
  </div>
  <script type="module">
    import { auth } from './js/firebase.js';
    import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    onAuthStateChanged(auth, (user) => { if (user) window.location.href = 'admin.html'; });
    document.getElementById('loginBtn').onclick = () => {
      const btn = document.getElementById('loginBtn'); btn.innerHTML = 'Memproses...'; btn.disabled = true;
      signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
       .then(() => {}).catch((err) => { document.getElementById('errorMsg').innerText = 'Email atau password salah'; btn.innerHTML = 'Masuk ke Dashboard'; btn.disabled = false; });
    };
  </script>
</body>
</html>
