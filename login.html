<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="w-full px-4 py-4 text-base flex items-center justify-center min-h-screen">
  <div class="glass w-full max-w-sm rounded-3xl p-6">
    <h1 class="font-extrabold text-2xl text-center mb-6">Login Admin</h1>
    <input id="email" type="email" placeholder="Email" class="bg-white/10 placeholder-white/50 p-3 rounded-lg w-full mb-3 text-sm border-white/10">
    <input id="password" type="password" placeholder="Password" class="bg-white/10 placeholder-white/50 p-3 rounded-lg w-full mb-4 text-sm border-white/10">
    <button id="loginBtn" class="bg-amber-400 text-black font-bold w-full py-3 rounded-xl">Login</button>
    <p id="errorMsg" class="text-red-400 text-xs text-center mt-3"></p>
  </div>
  <script type="module">
    import { auth } from './js/firebase.js';
    import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    onAuthStateChanged(auth, (user) => { if (user) window.location.href = 'admin.html'; });
    document.getElementById('loginBtn').onclick = () => {
      signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
       .catch((err) => document.getElementById('errorMsg').innerText = 'Email atau password salah');
    };
  </script>
</body>
</html>
