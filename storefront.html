<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title id="page-title">LINKify — Toko Online</title>
  <meta id="meta-desc" name="description" content="Toko online premium — belanja mudah, pesan via WhatsApp">
  <meta id="og-title" property="og:title" content="LINKify — Toko Online">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://linkbio.vercel.app/logo-linkify.png">
  <meta id="og-url" property="og:url" content="https://linkbio.vercel.app/">
  <meta name="twitter:card" content="summary">
  <meta name="robots" content="index, follow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/index.css">
  <link rel="icon" type="image/png" sizes="32x32" href="logo-linkify.png">
  <link rel="apple-touch-icon" href="logo-linkify.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FF6B35">
  <style>
    /* Critical inline — prevent FOUC */
    body.index-page{background:#0A0A0F;}
    .page-skeleton{display:flex;flex-direction:column;align-items:center;padding:24px 16px;}
    .ps-avatar{width:82px;height:82px;border-radius:50%;background:rgba(255,255,255,.07);margin-bottom:12px;animation:psk 1.4s ease-in-out infinite;}
    .ps-line{height:14px;border-radius:8px;background:rgba(255,255,255,.06);margin-bottom:8px;animation:psk 1.4s ease-in-out infinite;}
    .ps-btn{height:52px;border-radius:14px;background:rgba(255,255,255,.05);margin-bottom:10px;animation:psk 1.4s ease-in-out infinite;}
    @keyframes psk{0%,100%{opacity:.7}50%{opacity:.3}}
  </style>
</head>
<body class="index-page">
<div class="page-wrap">
  <div class="container">

    <!-- SKELETON (replaced by JS once data loads) -->
    <div id="page-skeleton" class="page-skeleton">
      <div class="ps-avatar"></div>
      <div class="ps-line" style="width:140px;"></div>
      <div class="ps-line" style="width:100px;margin-bottom:20px;"></div>
      <div class="ps-btn" style="width:100%;max-width:420px;"></div>
      <div class="ps-btn" style="width:100%;max-width:420px;"></div>
      <div class="ps-line" style="width:80px;margin-top:20px;"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:420px;margin-top:10px;">
        <div class="ps-btn" style="height:160px;border-radius:12px;"></div>
        <div class="ps-btn" style="height:160px;border-radius:12px;"></div>
      </div>
    </div>

    <!-- MAIN CONTENT (hidden until loaded) -->
    <div id="main-content" style="display:none;">

      <!-- TOP BAR -->
      <div class="top-bar">
        <button type="button" onclick="shareLink()" class="share-btn" aria-label="Bagikan toko" style="min-width:44px;min-height:44px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/>
            <polyline points="16 6 12 2 8 6"/>
            <line x1="12" y1="2" x2="12" y2="15"/>
          </svg>
        </button>
      </div>

      <!-- HERO -->
      <div class="hero fade-up">
        <div class="logo-wrapper">
          <img id="profileImg" src="https://placehold.co/200x200/111/333?text=+" alt="Logo Toko" class="logo-img" loading="eager" decoding="async" width="82" height="82">
        </div>
        <h1 id="username" class="store-name"></h1>
        <div id="verified-badge" class="verified-badge" style="display:none;" aria-label="Toko Terverifikasi Premium">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true" width="13" height="13">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
          </svg>
          Terverifikasi
        </div>
        <p id="bio" class="store-desc"></p>
      </div>

      <!-- SOCIAL -->
      <div class="social-section fade-up" id="social-bar" style="display:none;" role="navigation" aria-label="Media sosial toko">
        <div id="social-icons" class="social-icons"></div>
      </div>

      <!-- PLATFORM BUTTONS -->
      <div class="platform-section fade-up" role="navigation" aria-label="Platform pembelian">
        <a id="link-wa-main" href="#" target="_blank" rel="noopener noreferrer" class="platform-btn wa-btn" onclick="trackClick('wa')" aria-label="Pesan via WhatsApp" style="min-height:52px;">
          <div class="icon-box"><svg viewBox="0 0 24 24" width="20" height="20" fill="white" aria-hidden="true"><use href="#ico-wa"/></svg></div>
          <span>Pesan via WhatsApp</span>
          <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" width="14" height="14" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
        <a id="link-shopee" href="#" target="_blank" rel="noopener noreferrer" class="platform-btn shopee-btn hidden" onclick="trackClick('shopee')" aria-label="Lihat di Shopee" style="min-height:52px;">
          <div class="icon-box"><svg viewBox="0 0 24 24" width="20" height="20" fill="white" aria-hidden="true"><use href="#ico-shopee"/></svg></div>
          <span>Beli di Shopee</span>
          <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" width="14" height="14" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
        <a id="link-tokped" href="#" target="_blank" rel="noopener noreferrer" class="platform-btn tokped-btn hidden" aria-label="Lihat di Tokopedia" style="min-height:52px;">
          <div class="icon-box"><svg viewBox="0 0 24 24" width="20" height="20" fill="white" aria-hidden="true"><use href="#ico-tokped"/></svg></div>
          <span>Beli di Tokopedia</span>
          <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" width="14" height="14" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
      </div>

      <!-- CUSTOM BUTTONS (Premium) -->
      <div id="custom-buttons-section" class="platform-section" style="display:none;" aria-label="Link tambahan">
        <div class="custom-btn-wrap"></div>
      </div>

      <!-- GALLERY BUTTON -->
      <div id="gallery-btn-wrap" style="display:none;" class="fade-up">
        <a id="gallery-btn" href="gallery.html" class="gallery-link-btn" aria-label="Lihat gallery foto toko">
          <div class="gallery-btn-previews" id="gallery-previews"></div>
          <div class="gallery-btn-text">
            <span class="gallery-btn-label">Gallery Foto</span>
            <span class="gallery-btn-count" id="gallery-count"></span>
          </div>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16" height="16" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
      </div>

      <!-- CATALOG -->
      <section class="catalog-section" aria-label="Katalog produk">
        <div class="section-header fade-up">
          <span class="section-title">Katalog Produk</span>
        </div>
        <nav id="kategori-filter" class="kategori-filter" style="display:none;" aria-label="Filter kategori produk"></nav>
        <div id="unggulan-section" style="display:none;">
          <div class="unggulan-label">Produk Unggulan</div>
          <div id="unggulanList" class="product-grid" style="margin-bottom:20px;"></div>
          <div class="unggulan-divider"></div>
          <div class="unggulan-label" style="margin-top:16px;">Semua Produk</div>
        </div>
        <div id="productList" class="product-grid"></div>
      </section>

    </div><!-- /main-content -->

    <!-- ERROR STATE (shown if store not found / blocked) -->
    <div id="error-state" style="display:none;text-align:center;padding:60px 20px;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40" style="opacity:.3;margin-bottom:12px;"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
      <p id="error-msg" style="font-size:14px;color:rgba(255,255,255,.4);">Toko tidak ditemukan</p>
    </div>

  </div>

  <footer class="footer" id="main-footer" style="display:none;">
    <p id="footer-store" class="footer-copy-text">© 2025 My Store</p>
    <div class="footer-brand">
      <img src="logo-linkify.png" alt="LINKify" loading="lazy" decoding="async" width="14" height="14">
      Powered by LINKify
    </div>
  </footer>
</div>

<!-- Floating WA -->
<a id="waBtn" href="#" target="_blank" rel="noopener noreferrer" data-wa="" class="floating-wa" aria-label="Chat WhatsApp" onclick="trackClick('wa')" style="display:none;">
  <svg viewBox="0 0 24 24" width="26" height="26" fill="white" aria-hidden="true"><use href="#ico-wa"/></svg>
</a>

<!-- SVG Sprite -->

<script>
// Reveal main content — called by script.js after data loads
window.__showMainContent = function() {
  document.getElementById('page-skeleton').style.display = 'none';
  document.getElementById('main-content').style.display = '';
  document.getElementById('main-footer').style.display = '';
  const waBtn = document.getElementById('waBtn');
  if (waBtn) waBtn.style.display = '';
};
window.__showError = function(msg) {
  document.getElementById('page-skeleton').style.display = 'none';
  const errEl = document.getElementById('error-state');
  if (errEl) errEl.style.display = '';
  const msgEl = document.getElementById('error-msg');
  if (msgEl && msg) msgEl.textContent = msg;
};
window.shareLink = function() {
  const title = document.getElementById('username')?.innerText || 'Toko';
  if (navigator.share) {
    navigator.share({ title, url: window.location.href }).catch(() => {});
  } else {
    navigator.clipboard?.writeText(window.location.href).then(() => {
      const btn = document.querySelector('.share-btn');
      if (btn) {
        btn.style.background = 'rgba(16,185,129,0.15)';
        setTimeout(() => { btn.style.background = ''; }, 1400);
      }
    }).catch(() => {});
  }
};
// Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>

<script type="module">
  import { checkMaintenance } from './js/maintenance.js';
  await checkMaintenance();
</script>
<script type="module" src="js/script.js"></script>
</body>
</html>
