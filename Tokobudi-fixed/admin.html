<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Tokobudi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* TAMBAHAN KHUSUS LAYOUT ADMIN AGAR RESPONSIF */
    .wrapper { display: flex; min-height: 100vh; }
    
    /* Sidebar di Kiri */
    .sidebar { width: 260px; background: white; border-right: 1px solid var(--border); position: fixed; height: 100%; padding: 24px; display: flex; flex-direction: column; z-index: 10; transition: transform 0.3s; }
    .sidebar-logo { font-weight: 800; font-size: 24px; margin-bottom: 32px; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .sidebar-menu { display: flex; flex-direction: column; gap: 8px; }
    .tab-btn { padding: 12px 16px; border-radius: 12px; cursor: pointer; font-weight: 600; color: var(--text-muted); transition: all 0.2s; display: flex; align-items: center; gap: 12px; font-size: 15px; border: none; background: transparent; text-align: left; width: 100%; }
    .tab-btn svg { width: 20px; height: 20px; }
    .tab-btn:hover { background: var(--bg); color: var(--text); }
    .tab-btn.sidebar-active { background: var(--text); color: white; }

    /* Konten Utama di Kanan */
    .main-content { margin-left: 260px; flex: 1; padding: 32px; max-width: 1200px; margin-right: auto; }
    
    /* Header Mobile */
    .mobile-header { display: none; padding: 16px; background: white; border-bottom: 1px solid var(--border); align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 9; }
    .menu-toggle { width: 40px; height: 40px; border-radius: 8px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; }

    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card { padding: 20px; display: flex; flex-direction: column; gap: 4px; }
    .stat-label { font-size: 14px; color: var(--text-muted); font-weight: 500; }
    .stat-value { font-size: 28px; font-weight: 800; color: var(--text); }

    /* Product List */
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    
    /* Modal & Form */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
    .modal-content { background: white; width: 100%; max-width: 480px; border-radius: 24px 24px 0 0; padding: 24px; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); animation: slideUp 0.3s ease; max-height: 90vh; overflow-y: auto; }
    .modal-handle { width: 40px; height: 4px; background: #E5E7EB; border-radius: 2px; margin: 0 auto 24px; cursor: pointer; }
    
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: var(--text); }
    .form-input, .form-textarea { width: 100%; padding: 12px; border-radius: 12px; font-size: 14px; border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; transition: all 0.2s; box-sizing: border-box; }
    .form-input:focus, .form-textarea:focus { border-color: var(--text); background: white; box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }
    
    .btn { padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; }
    .btn-primary { background: var(--text); color: white; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-danger { background: #FEE2E2; color: #EF4444; padding: 6px 12px; font-size: 12px; }
    .btn-edit { background: #F3F4F6; color: #111; padding: 6px 12px; font-size: 12px; margin-right: 8px; }

    /* Toast */
    #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); color: white; padding: 12px 24px; border-radius: 50px; font-size: 14px; font-weight: 600; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.2); white-space: nowrap; }
    @keyframes toastIn { to { transform: translateX(-50%) translateY(0); } }
    @keyframes toastOut { to { transform: translateX(-50%) translateY(-100px); opacity: 0; } }

    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    /* Responsivitas Mobile */
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); z-index: 20; }
      .sidebar.active { transform: translateX(0); }
      .main-content { margin-left: 0; padding: 16px; margin-bottom: 80px; }
      .mobile-header { display: flex; }
      .products-grid { grid-template-columns: 1fr; }
      .modal-content { border-radius: 24px; height: 100%; max-height: none; max-width: none; animation: none; }
    }
  </style>
</head>
<body>

  <div class="wrapper">
    
    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-logo">Tokobudi<span style="color:#FF6B35">.</span></div>
      <div class="sidebar-menu">
        <button class="tab-btn sidebar-active" data-page="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
          Dashboard
        </button>
        <button class="tab-btn" data-page="products">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
          Produk
        </button>
        <button class="tab-btn" data-page="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          Pengaturan Toko
        </button>
        <button class="tab-btn" data-page="account">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          Akun Saya
        </button>
      </div>
      <div style="margin-top: auto;">
        <button id="logout-btn" class="tab-btn" style="color: #EF4444;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          Keluar
        </button>
      </div>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      
      <!-- MOBILE HEADER -->
      <div class="mobile-header">
        <div style="font-weight: 800; font-size: 18px;">Admin</div>
        <div class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('active')">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </div>
      </div>

      <!-- HALAMAN DASHBOARD -->
      <div id="page-dashboard" class="page active">
        <h2 style="margin-bottom: 8px;">Dashboard</h2>
        <p id="live-clock" style="font-size: 13px; color: var(--text-muted); margin-bottom: 4px;"></p>
        <p id="big-clock" style="font-size: 28px; font-weight: 800; margin-bottom: 2px;"></p>
        <p id="big-date" style="font-size: 13px; color: var(--text-muted); margin-bottom: 24px;"></p>
        <div class="stats-grid">
          <div class="stat-card earth-card">
            <span class="stat-label">Total Produk</span>
            <span class="stat-value" id="stat-total">0</span>
          </div>
          <div class="stat-card earth-card">
            <span class="stat-label">Stok Habis</span>
            <span class="stat-value" id="stat-empty" style="color: #EF4444;">0</span>
          </div>
          <div class="stat-card earth-card">
            <span class="stat-label">Login Admin</span>
            <span class="stat-value" id="admin-email" style="font-size: 16px; line-height: 1.5;">...</span>
          </div>
        </div>
      </div>

      <!-- HALAMAN PRODUK -->
      <div id="page-products" class="page">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
          <h2>Daftar Produk</h2>
          <button id="add-product-btn" class="btn btn-primary jelly-click">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Tambah Produk
          </button>
        </div>
        <div id="products-list" class="products-grid">
          <!-- Produk akan muncul di sini -->
        </div>
      </div>

      <!-- HALAMAN PENGATURAN -->
      <div id="page-settings" class="page">
        <h2 style="margin-bottom: 24px;">Pengaturan Toko</h2>
        <div class="earth-card" style="padding: 24px; max-width: 600px;">
          <div class="form-group">
            <label class="form-label">Nama Toko (Username)</label>
            <input type="text" id="username-input" class="form-input" placeholder="Contoh: Budi Store">
          </div>
          <div class="form-group">
            <label class="form-label">Deskripsi Singkat (Bio)</label>
            <textarea id="bio-input" class="form-textarea" rows="3" placeholder="Ceritakan tentang toko lu..."></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Link WhatsApp Utama</label>
            <input type="text" id="wa-input" class="form-input" placeholder="https://wa.me/628...">
          </div>
          <div class="form-group">
            <label class="form-label">Link Shopee Utama</label>
            <input type="text" id="shopee-input" class="form-input" placeholder="https://shopee.co.id/...">
          </div>
          <div class="form-group">
            <label class="form-label">Logo Toko</label>
            <div style="display: flex; gap: 16px; align-items: center;">
              <img id="logo-preview" src="" style="width: 60px; height: 60px; border-radius: 50%; object-fit: cover; background: #eee;">
              <button type="button" id="logo-file" class="btn btn-primary" style="padding: 8px 16px; font-size: 12px;">Ganti Logo</button>
              <input type="file" id="logo-file-hidden" accept="image/*" style="display: none;">
              <input type="hidden" id="logo-url">
            </div>
          </div>
          <button id="save-settings-btn" class="btn btn-primary jelly-click" style="width: 100%; margin-top: 16px;">Simpan Pengaturan Toko</button>
        </div>
      </div>

      <!-- HALAMAN AKUN -->
      <div id="page-account" class="page">
        <h2 style="margin-bottom: 24px;">Keamanan Akun</h2>
        <div class="earth-card" style="padding: 24px; max-width: 600px;">
          <div class="form-group">
            <label class="form-label">Email Login Baru</label>
            <input type="email" id="new-email-input" class="form-input">
          </div>
          <div class="form-group">
            <label class="form-label">Password Baru (Biarkan kosong jika tidak ingin mengganti)</label>
            <input type="password" id="new-password-input" class="form-input" placeholder="Min 6 karakter">
          </div>
          <div class="form-group">
            <label class="form-label" style="color: #EF4444;">Password Lama (Wajib untuk verifikasi)</label>
            <input type="password" id="reauth-password-input" class="form-input" placeholder="Masukkan password lama lu">
          </div>
          <button id="save-account-btn" class="btn btn-primary jelly-click" style="width: 100%; margin-top: 16px;">Update Akun</button>
        </div>
      </div>

    </div>
  </div>

  <!-- MODAL PRODUK -->
  <div id="product-modal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-handle"></div>
      <h3 id="modal-title" style="margin-bottom: 20px;">Tambah Produk</h3>
      
      <form id="product-form">
        <input type="hidden" id="product-id">
        
        <div class="form-group">
          <label class="form-label">Nama Produk</label>
          <input type="text" id="product-name" class="form-input" required>
        </div>

        <div style="display: flex; gap: 16px;">
          <div class="form-group" style="flex: 1;">
            <label class="form-label">Harga (Rp)</label>
            <input type="number" id="product-price" class="form-input" required>
          </div>
          <div class="form-group" style="flex: 1;">
            <label class="form-label">Stok</label>
            <input type="number" id="product-stock" class="form-input" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Link Shopee Produk (Opsional)</label>
          <input type="text" id="product-shopee" class="form-input" placeholder="https://...">
        </div>
        
        <div class="form-group">
          <label class="form-label">Link WA Khusus Produk (Opsional)</label>
          <input type="text" id="product-wa" class="form-input" placeholder="Biarkan kosong pakai WA utama">
        </div>

        <div class="form-group">
          <label class="form-label">Deskripsi Produk</label>
          <textarea id="product-description" class="form-textarea" rows="2"></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">Foto Produk</label>
          <input type="hidden" id="product-image-url">
          
          <div id="upload-trigger" class="btn" style="border: 2px dashed var(--border); width: 100%; background: var(--bg); text-align: center; padding: 20px;">
            <span id="upload-text" style="color: var(--text-muted);">Klik untuk upload foto</span>
          </div>
          <input type="file" id="product-image-file" accept="image/*" style="display: none;">
          
          <div id="image-preview" style="margin-top: 12px; display: none;">
            <img src="" style="width: 100%; height: 200px; object-fit: cover; border-radius: 12px;">
          </div>
        </div>

        <button type="submit" id="save-product-btn" class="btn btn-primary" style="width: 100%; margin-top: 16px;">Simpan Produk</button>
      </form>
    </div>
  </div>

  <!-- TOAST NOTIFIKASI -->
  <div id="toast">Notifikasi</div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
