<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Gallery — LINKify</title>
  <meta name="description" content="Gallery foto toko">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/index.css?v=20260510">
  <link rel="icon" type="image/png" sizes="32x32" href="logo-linkify.png">
  <link rel="apple-touch-icon" href="logo-linkify.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FF6B35">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --g-bg:#0A0A0F;--g-card:rgba(255,255,255,0.04);
      --g-border:rgba(255,255,255,0.08);--g-text:rgba(255,255,255,0.88);
      --g-sub:rgba(255,255,255,0.4);--g-accent:#FF6B35;
    }
    html{background:var(--g-bg);}
    body{background:var(--g-bg);font-family:Inter,sans-serif;min-height:100vh;color:var(--g-text);}

    /* TOP BAR */
    .g-topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px;
      padding:14px 16px 12px;background:rgba(10,10,15,0.92);
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border-bottom:1px solid var(--g-border);}
    .g-back{display:flex;align-items:center;justify-content:center;width:34px;height:34px;
      border-radius:10px;background:rgba(255,255,255,0.07);border:1px solid var(--g-border);
      color:var(--g-text);text-decoration:none;flex-shrink:0;transition:background .15s;}
    .g-back:hover{background:rgba(255,255,255,0.12);}
    .g-topbar-info{flex:1;min-width:0;}
    .g-topbar-title{font-size:15px;font-weight:700;line-height:1.2;}
    .g-topbar-sub{font-size:11px;color:var(--g-sub);margin-top:2px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .g-topbar-count{font-size:11px;font-weight:600;color:var(--g-accent);
      background:rgba(255,107,53,0.12);border:1px solid rgba(255,107,53,0.2);
      padding:4px 10px;border-radius:20px;flex-shrink:0;white-space:nowrap;}

    /* KATEGORI FILTER */
    .g-kat-bar{
      display:flex;gap:8px;padding:10px 12px 2px;
      overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;
      border-bottom:1px solid var(--g-border);
    }
    .g-kat-bar::-webkit-scrollbar{display:none;}
    .g-kat-btn{
      flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--g-border);
      background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.55);
      font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;
      font-family:Inter,sans-serif;white-space:nowrap;
    }
    .g-kat-btn.active{
      background:var(--g-accent);border-color:var(--g-accent);color:#fff;
    }
    .g-kat-btn:not(.active):hover{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.8);}

    /* GRID */
    .g-wrap{padding:10px 10px 100px;position:relative;z-index:1;}
    .g-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
    @media(min-width:400px){.g-grid{grid-template-columns:repeat(3,1fr);}}

    /* CARD */
    .g-card{border-radius:12px;overflow:hidden;background:var(--g-card);border:1px solid var(--g-border);
      cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;
      position:relative;display:flex;flex-direction:column;}
    .g-card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,0.16);box-shadow:0 8px 24px rgba(0,0,0,.4);}
    .g-card:active{transform:scale(0.97);}
    .g-card-img-wrap{position:relative;aspect-ratio:1;overflow:hidden;background:rgba(255,255,255,.03);}
    .g-card-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s ease;}
    .g-card:hover .g-card-img-wrap img{transform:scale(1.06);}
    .g-card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.55) 0%,transparent 50%);
      opacity:0;transition:opacity .2s;display:flex;align-items:flex-end;justify-content:center;padding-bottom:10px;}
    .g-card:hover .g-card-overlay{opacity:1;}
    .g-zoom-icon{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.15);
      backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;}
    .g-caption{padding:7px 9px 9px;font-size:11px;line-height:1.4;color:rgba(255,255,255,.6);
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word;}
    .g-caption:empty{display:none;}
    .g-kat-chip{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.65);
      backdrop-filter:blur(6px);border-radius:20px;padding:3px 8px;
      font-size:10px;font-weight:600;color:rgba(255,255,255,.85);pointer-events:none;
      white-space:nowrap;max-width:80%;overflow:hidden;text-overflow:ellipsis;}

    /* SKELETON */
    .g-skeleton{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:10px 10px 0;}
    @media(min-width:400px){.g-skeleton{grid-template-columns:repeat(3,1fr);}}
    .g-skel-card{border-radius:12px;overflow:hidden;}
    .g-skel-img{aspect-ratio:1;background:rgba(255,255,255,.06);animation:skel 1.4s ease-in-out infinite;}
    .g-skel-cap{height:24px;margin:7px 9px 9px;background:rgba(255,255,255,.04);border-radius:6px;animation:skel 1.4s ease-in-out infinite .2s;}
    @keyframes skel{0%,100%{opacity:.6}50%{opacity:.25}}

    /* EMPTY */
    .g-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:60px 20px;gap:12px;color:var(--g-sub);font-size:13px;text-align:center;grid-column:span 2;}
    @media(min-width:400px){.g-empty{grid-column:span 3;}}
    .g-empty svg{opacity:.25;}

    /* LIGHTBOX */
    #glb{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0);display:flex;
      flex-direction:column;align-items:center;justify-content:center;
      pointer-events:none;transition:background .22s;}
    #glb.open{background:rgba(0,0,0,.94);pointer-events:all;}
    #glb-inner{display:flex;flex-direction:column;align-items:center;gap:0;
      width:100%;max-width:520px;padding:0 12px;
      transform:scale(0.94);opacity:0;transition:transform .22s cubic-bezier(.34,1.4,.64,1),opacity .2s;}
    #glb.open #glb-inner{transform:scale(1);opacity:1;}
    #glb-img-wrap{position:relative;width:100%;border-radius:14px;overflow:hidden;
      background:rgba(255,255,255,.04);box-shadow:0 20px 60px rgba(0,0,0,.6);}
    #glb-img{width:100%;max-height:66vh;object-fit:contain;display:block;}
    #glb-caption-wrap{width:100%;margin-top:10px;background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 14px;}
    #glb-caption{font-size:13px;line-height:1.5;color:rgba(255,255,255,.75);text-align:center;word-break:break-word;}
    #glb-counter{font-size:11px;color:rgba(255,255,255,.35);margin-top:8px;text-align:center;letter-spacing:.5px;}
    #glb-close{position:fixed;top:0;right:0;width:52px;height:52px;border:none;background:none;
      cursor:pointer;color:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;}
    #glb-close:hover{color:white;}
    #glb-prev,#glb-next{position:fixed;top:50%;transform:translateY(-50%);width:40px;height:56px;
      border:none;background:none;cursor:pointer;color:rgba(255,255,255,.5);
      display:flex;align-items:center;justify-content:center;}
    #glb-prev{left:0;}#glb-next{right:0;}
    #glb-prev:hover,#glb-next:hover{color:white;}
    #glb-dots{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap;justify-content:center;}
    .glb-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2);
      border:none;padding:0;cursor:pointer;transition:background .15s,transform .15s;}
    .glb-dot.active{background:var(--g-accent);transform:scale(1.3);}
    #tpl-bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;}
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="g-topbar">
    <a id="back-btn" href="#" class="g-back" aria-label="Kembali ke toko">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="15" height="15"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </a>
    <div class="g-topbar-info">
      <div class="g-topbar-title">Gallery</div>
      <div id="gallery-store-name" class="g-topbar-sub">Memuat...</div>
    </div>
    <div id="gallery-topbar-count" class="g-topbar-count" style="display:none;"></div>
  </div>

  <!-- KATEGORI FILTER (diisi oleh JS) -->
  <div id="g-kat-bar" class="g-kat-bar" style="display:none;"></div>

  <!-- SKELETON -->
  <div id="skeleton-wrap" class="g-skeleton">
    <div class="g-skel-card"><div class="g-skel-img"></div><div class="g-skel-cap"></div></div>
    <div class="g-skel-card"><div class="g-skel-img"></div><div class="g-skel-cap"></div></div>
    <div class="g-skel-card"><div class="g-skel-img"></div><div class="g-skel-cap"></div></div>
    <div class="g-skel-card"><div class="g-skel-img"></div><div class="g-skel-cap"></div></div>
    <div class="g-skel-card"><div class="g-skel-img"></div><div class="g-skel-cap"></div></div>
    <div class="g-skel-card"><div class="g-skel-img"></div><div class="g-skel-cap"></div></div>
  </div>

  <!-- MAIN GRID -->
  <div class="g-wrap" style="display:none;" id="g-wrap">
    <div id="gallery-full-grid" class="g-grid"></div>
  </div>

  <!-- LIGHTBOX -->
  <div id="glb" role="dialog" aria-modal="true" aria-label="Lihat foto">
    <button id="glb-close" aria-label="Tutup">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="18" height="18"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <button id="glb-prev" aria-label="Sebelumnya">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="22" height="22"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <button id="glb-next" aria-label="Berikutnya">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="22" height="22"><path d="M9 18l6-6-6-6"/></svg>
    </button>
    <div id="glb-inner">
      <div id="glb-img-wrap"><img id="glb-img" src="" alt="Gallery foto"></div>
      <div id="glb-caption-wrap" style="display:none;"><div id="glb-caption"></div></div>
      <div id="glb-counter"></div>
      <div id="glb-dots"></div>
    </div>
  </div>

<script type="module">
import { db } from '/firebase.js';
import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
import { checkPremium, escHtml, hexToRgb } from '/js/utils.js';

const params = new URLSearchParams(location.search);
const uid    = params.get('uid');
document.getElementById('back-btn').href = uid ? `index.html?uid=${uid}` : 'landing.html';

// allPhotos = full list, filteredPhotos = currently shown (after kategori filter)
let allPhotos      = [];
let filteredPhotos = [];
let activeKat      = 'Semua';
let curIdx         = 0;

// Normalize: support legacy string array AND new object format
const normalize = item =>
  typeof item === 'string'
    ? { url: item, caption: '', kategori: '' }
    : { url: item?.url || '', caption: item?.caption || '', kategori: item?.kategori || '' };

function hideSkeleton() {
  document.getElementById('skeleton-wrap').style.display = 'none';
  document.getElementById('g-wrap').style.display = '';
}

function buildGrid(photos) {
  const grid = document.getElementById('gallery-full-grid');
  if (!photos.length) {
    grid.innerHTML = `<div class="g-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <span>Tidak ada foto di kategori ini</span>
    </div>`;
    return;
  }
  const frag = document.createDocumentFragment();
  photos.forEach((p, i) => {
    const globalIdx = allPhotos.indexOf(p); // lightbox uses allPhotos index? No — filtered for lightbox
    const card = document.createElement('div');
    card.className  = 'g-card';
    card.tabIndex   = 0;
    card.setAttribute('role', 'button');
    card.setAttribute('aria-label', p.caption || `Foto ${i+1}`);
    card.innerHTML = `
      <div class="g-card-img-wrap">
        <img src="${escHtml(p.url)}" alt="${escHtml(p.caption || 'Gallery foto ' + (i+1))}" loading="lazy" decoding="async">
        <div class="g-card-overlay">
          <div class="g-zoom-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" width="14" height="14">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
          </div>
        </div>
        ${p.kategori ? `<div class="g-kat-chip">${escHtml(p.kategori)}</div>` : ''}
      </div>
      ${p.caption ? `<div class="g-caption">${escHtml(p.caption)}</div>` : ''}`;
    card.querySelector('img').onerror = () => { card.style.display = 'none'; };
    card.addEventListener('click', () => openLb(i));
    card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openLb(i); });
    frag.appendChild(card);
  });
  grid.innerHTML = '';
  grid.appendChild(frag);
}

function setActiveKat(kat) {
  activeKat      = kat;
  filteredPhotos = kat === 'Semua' ? allPhotos : allPhotos.filter(p => p.kategori === kat);
  buildGrid(filteredPhotos);

  // Update button states
  document.querySelectorAll('.g-kat-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.kat === kat);
  });
}

function buildKatFilter(photos) {
  const bar  = document.getElementById('g-kat-bar');
  const cats = [...new Set(photos.map(p => p.kategori).filter(Boolean))];
  if (!cats.length) { bar.style.display = 'none'; return; }

  bar.style.display = '';
  const all   = ['Semua', ...cats];
  bar.innerHTML = all.map(k =>
    `<button class="g-kat-btn${k === 'Semua' ? ' active' : ''}" data-kat="${escHtml(k)}">${escHtml(k)}</button>`
  ).join('');

  // Single delegated listener
  bar.addEventListener('click', e => {
    const btn = e.target.closest('.g-kat-btn');
    if (!btn) return;
    setActiveKat(btn.dataset.kat);
  });
}

if (!uid) {
  hideSkeleton();
  document.getElementById('gallery-full-grid').innerHTML =
    `<div class="g-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg><span>URL tidak valid</span></div>`;
} else {
  try {
    const snap = await getDoc(doc(db, 'toko', uid));
    if (!snap.exists()) throw new Error('Toko tidak ditemukan.');
    const s      = snap.data();
    const isPrem = checkPremium(s);

    // Accent color
    const accent = (isPrem && s.premium?.accentColor) ? s.premium.accentColor : '#FF6B35';
    document.documentElement.style.setProperty('--g-accent', accent);

    // Template background
    if (isPrem && s.premium?.templateBg) {
      const bg = document.createElement('div');
      bg.id = 'tpl-bg-layer'; bg.setAttribute('aria-hidden', 'true');
      bg.style.cssText = `background-image:url('${s.premium.templateBg}');background-size:cover;background-position:center top;opacity:.13;`;
      document.body.prepend(bg);
    }

    document.getElementById('gallery-store-name').textContent = s.namaToko || 'Toko';
    document.title = `Gallery — ${s.namaToko || 'Toko'}`;

    allPhotos      = (Array.isArray(s.gallery) ? s.gallery : []).map(normalize).filter(p => p.url);
    filteredPhotos = allPhotos;

    hideSkeleton();

    if (!allPhotos.length) {
      document.getElementById('gallery-full-grid').innerHTML =
        `<div class="g-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>Gallery belum ada foto</span></div>`;
    } else {
      const badge = document.getElementById('gallery-topbar-count');
      badge.textContent = allPhotos.length + ' foto';
      badge.style.display = '';

      buildKatFilter(allPhotos);
      buildGrid(filteredPhotos);
    }

  } catch(e) {
    hideSkeleton();
    document.getElementById('gallery-full-grid').innerHTML =
      `<div class="g-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg><span>${escHtml(e.message || 'Gagal memuat gallery.')}</span></div>`;
  }
}

// ── LIGHTBOX ──────────────────────────────────────────────────────────────────
const lb        = document.getElementById('glb');
const lbImg     = document.getElementById('glb-img');
const lbCap     = document.getElementById('glb-caption');
const lbCapWrap = document.getElementById('glb-caption-wrap');
const lbCount   = document.getElementById('glb-counter');
const lbDots    = document.getElementById('glb-dots');

function updateLb() {
  const p  = filteredPhotos[curIdx];
  lbImg.src = p.url;
  lbImg.alt = p.caption || `Gallery foto ${curIdx + 1}`;
  lbCap.textContent = p.caption;
  lbCapWrap.style.display = p.caption ? '' : 'none';
  lbCount.textContent = `${curIdx + 1} / ${filteredPhotos.length}`;
  lbDots.querySelectorAll('.glb-dot').forEach((d, i) => d.classList.toggle('active', i === curIdx));
}

function openLb(idx) {
  curIdx = idx;
  lbDots.innerHTML = '';
  if (filteredPhotos.length > 1) {
    lbDots.innerHTML = filteredPhotos.map((_, i) =>
      `<button class="glb-dot${i === idx ? ' active' : ''}" data-i="${i}" aria-label="Foto ${i+1}"></button>`
    ).join('');
    lbDots.querySelectorAll('.glb-dot').forEach(d =>
      d.addEventListener('click', () => { curIdx = parseInt(d.dataset.i); updateLb(); })
    );
  }
  updateLb();
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLb()  { lb.classList.remove('open'); document.body.style.overflow = ''; }
function prevLb()   { curIdx = (curIdx - 1 + filteredPhotos.length) % filteredPhotos.length; updateLb(); }
function nextLb()   { curIdx = (curIdx + 1) % filteredPhotos.length; updateLb(); }

document.getElementById('glb-close').addEventListener('click', closeLb);
document.getElementById('glb-prev').addEventListener('click', e => { e.stopPropagation(); prevLb(); });
document.getElementById('glb-next').addEventListener('click', e => { e.stopPropagation(); nextLb(); });
lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });

document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape')      closeLb();
  if (e.key === 'ArrowLeft')   prevLb();
  if (e.key === 'ArrowRight')  nextLb();
});

// Touch swipe
let touchX = null;
lb.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
lb.addEventListener('touchend',   e => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 45) { dx < 0 ? nextLb() : prevLb(); }
  touchX = null;
});
</script>

<script type="module">
  import { checkMaintenance } from '/js/maintenance.js';
  await checkMaintenance();
</script>
</body>
</html>
