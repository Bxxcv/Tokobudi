<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Toko</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- OVERLAY -->
  <div id="overlay" class="overlay"></div>

  <div class="wrapper">

    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-logo">Dasboard Admin Toko<span>.</span></div>
      <div class="sidebar-menu">
        <button class="tab-btn active-tab" data-tab="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </button>
        <button class="tab-btn" data-tab="products">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          Produk
        </button>
        <button class="tab-btn" data-tab="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 0 00-1.82-.33 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 0 004.6 9a1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 0 009 4.68a1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 0 001 1.51 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 0 00-1.51 1z"/></svg>
          Pengaturan Toko
        </button>
        <button class="tab-btn" data-tab="account">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Akun Saya
        </button>
        <hr class="divider">
        <!-- TOMBOL COPY LINK TOKO BARU -->
        <button class="tab-btn" id="btn-copy-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copy Link Toko
        </button>
        <button class="tab-btn logout-btn" id="btn-logout">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Keluar
        </button>
      </div>
    </nav>

    <!-- MAIN -->
    <div class="main">

      <!-- MOBILE HEADER -->
      <div class="mob-header">
        <div class="mob-title">Tokobudi<span style="color:var(--accent)">.</span></div>
        <button class="hamburger" id="btn-hamburger">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="page-wrap">

        <!-- DASHBOARD -->
        <div id="tab-dashboard" class="page show">
          <div class="clock-box">
            <div class="clock-time" id="clock-time">--:--:--</div>
            <div class="clock-date" id="clock-date">Memuat...</div>
          </div>
          <div class="stats">
            <div class="stat">
              <div class="stat-lbl">Total Produk</div>
              <div class="stat-val" id="stat-total">-</div>
            </div>
            <div class="stat">
              <div class="stat-lbl">Stok Habis</div>
              <div class="stat-val red" id="stat-empty">-</div>
            </div>
            <div class="stat">
              <div class="stat-lbl">Admin</div>
              <div class="stat-val sm" id="admin-email">...</div>
            </div>
          </div>
        </div>

        <!-- PRODUK -->
        <div id="tab-products" class="page">
          <div class="prod-header">
            <h2 class="page-h" style="margin:0">Daftar Produk</h2>
            <button class="btn btn-dark" id="btn-add-product">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Tambah Produk
            </button>
          </div>
          <div class="prod-grid" id="products-list">
            <div class="skel-card"><div class="skel" style="height:130px;border-radius:14px 14px 0 0"></div><div style="padding:10px 12px"><div class="skel" style="height:12px;width:70%;margin-bottom:7px"></div><div class="skel" style="height:13px;width:45%"></div></div></div>
            <div class="skel-card"><div class="skel" style="height:130px;border-radius:14px 14px 0 0"></div><div style="padding:10px 12px"><div class="skel" style="height:12px;width:55%;margin-bottom:7px"></div><div class="skel" style="height:13px;width:40%"></div></div></div>
            <div class="skel-card"><div class="skel" style="height:130px;border-radius:14px 14px 0 0"></div><div style="padding:10px 12px"><div class="skel" style="height:12px;width:80%;margin-bottom:7px"></div><div class="skel" style="height:13px;width:50%"></div></div></div>
          </div>
        </div>

        <!-- SETTINGS -->
        <div id="tab-settings" class="page">
          <h2 class="page-h">Pengaturan Toko</h2>
          <div class="f-card">
            <div class="f-group">
              <label class="f-label">Nama Toko</label>
              <input type="text" id="inp-username" class="f-input" placeholder="Nama toko kamu...">
            </div>
            <div class="f-group">
              <label class="f-label">Deskripsi (Bio)</label>
              <textarea id="inp-bio" class="f-area" rows="3" placeholder="Ceritakan tentang toko kamu..."></textarea>
            </div>
            <div class="f-group">
              <label class="f-label">Link WhatsApp Utama</label>
              <input type="text" id="inp-wa" class="f-input" placeholder="https://wa.me/628...">
            </div>
            <div class="f-group">
              <label class="f-label">Link Shopee Utama</label>
              <input type="text" id="inp-shopee" class="f-input" placeholder="https://shopee.co.id/...">
            </div>
            <div class="f-group">
              <label class="f-label">Logo Toko</label>
              <div class="logo-row">
                <img id="logo-preview" src="https://placehold.co/200x200/F3F4F6/999?text=Logo" alt="Logo">
                <button type="button" id="btn-logo-pick" class="btn btn-dark" style="font-size:13px;padding:8px 14px;">Pilih Foto</button>
                <input type="file" id="inp-logo-file" accept="image/*" style="display:none">
                <input type="hidden" id="inp-logo-url">
              </div>
            </div>
            <button class="btn btn-dark btn-w" id="btn-save-settings" style="margin-top:10px;">Simpan Pengaturan</button>
          </div>
        </div>

        <!-- AKUN -->
        <div id="tab-account" class="page">
          <h2 class="page-h">Keamanan Akun</h2>
          <div class="f-card">
            <div class="f-group">
              <label class="f-label">Email Baru</label>
              <input type="email" id="inp-new-email" class="f-input">
            </div>
            <div class="f-group">
              <label class="f-label">Password Baru <small style="color:var(--text-muted);font-weight:400">(kosong = tidak ganti)</small></label>
              <input type="password" id="inp-new-pass" class="f-input" placeholder="Min 6 karakter">
            </div>
            <div class="f-group">
              <label class="f-label red">Password Lama (wajib untuk verifikasi)</label>
              <input type="password" id="inp-old-pass" class="f-input" placeholder="Password lama kamu">
            </div>
            <button class="btn btn-dark btn-w" id="btn-save-account" style="margin-top:10px;">Update Akun</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- MODAL PRODUK - UDAH DIBENERIN -->
  <div id="product-modal" class="modal-bg">
    <div class="modal-box">
      <div class="modal-pull" id="modal-pull"></div>
      <div class="modal-h" id="modal-title">Tambah Produk</div>
      <form id="product-form">
        <input type="hidden" id="inp-prod-id">
        <div class="f-group">
          <label class="f-label">Nama Produk *</label>
          <input type="text" id="inp-prod-name" class="f-input" required placeholder="Nama produk...">
        </div>
        <!-- INI YG DIBENERIN: f-row ditutup bener -->
        <div class="f-row">
          <div class="f-group">
            <label class="f-label">Harga (Rp) *</label>
            <input type="number" id="inp-prod-price" class="f-input" required min="0" placeholder="0">
          </div>
          <div class="f-group">
            <label class="f-label">Stok *</label>
            <input type="number" id="inp-prod-stock" class="f-input" required min="0" placeholder="0">
          </div>
        </div> <!-- PENUTUP F-ROW -->
        <div class="f-group">
          <label class="f-label">Deskripsi</label>
          <textarea id="inp-prod-desc" class="f-area" rows="2" placeholder="Deskripsi singkat..."></textarea>
        </div>
        <div class="f-group">
          <label class="f-label">Link Shopee Produk <small style="color:var(--text-muted);font-weight:400">(opsional)</small></label>
          <input type="text" id="inp-prod-shopee" class="f-input" placeholder="https://shopee.co.id/...">
        </div>
        <div class="f-group">
          <label class="f-label">Link WA Khusus <small style="color:var(--text-muted);font-weight:400">(opsional, pakai WA utama jika kosong)</small></label>
          <input type="text" id="inp-prod-wa" class="f-input" placeholder="https://wa.me/628...">
        </div>
        <div class="f-group">
          <label class="f-label">Foto Produk *</label>
          <input type="hidden" id="inp-prod-img">
          <div class="upload-zone" id="upload-zone">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:block;margin:0 auto 7px;opacity:.4"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Klik untuk pilih foto
          </div>
          <input type="file" id="inp-prod-file" accept="image/*" style="display:none">
          <div id="img-preview-wrap">
            <img id="img-preview" src="" alt="Preview">
          </div>
        </div>
        <button type="submit" id="btn-save-product" class="btn btn-dark btn-w">Simpan Produk</button>
      </form>
    </div>
  </div>

  <div id="toast"></div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
