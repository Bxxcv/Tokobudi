<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dasboard Admin - Toko Budi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="w-full px-4 py-4 text-base">
    <div class="max-w-2xl mx-auto">
        <!-- Header Admin -->
        <header class="glass rounded-3xl p-5 mb-6 border-t-4 border-amber-400">
            <div class="flex justify-between items-center mb-3">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-amber-400/20 rounded-xl flex items-center justify-center text-amber-400">
                        <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold leading-tight">Admin Panel</h1>
                        <span id="admin-email" class="text-xs text-white/40">Loading...</span>
                    </div>
                </div>
                <button id="logout-btn" class="bg-red-500/10 text-red-400 hover:bg-red-500/20 px-4 py-2 rounded-xl text-xs font-bold transition-colors flex items-center gap-1">
                    <i data-lucide="log-out" class="w-3 h-3"></i> Logout
                </button>
            </div>
            <a href="index.html" class="flex items-center gap-2 text-sm text-white/50 hover:text-amber-400 transition-colors mt-3">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                Lihat Toko Saya
            </a>
        </header>

        <!-- Segmented Tabs -->
        <div class="glass p-1.5 flex gap-1 mb-6 rounded-2xl">
            <button class="tab-btn sidebar-active flex-1 py-3 rounded-xl text-sm font-bold text-center" data-page="produk">Produk</button>
            <button class="tab-btn flex-1 py-3 rounded-xl text-sm font-bold text-center text-white/50" data-page="pengaturan">Pengaturan</button>
        </div>

        <!-- PAGE: PRODUK -->
        <main id="page-produk" class="page active">
            <button id="add-product-btn" class="w-full py-4 rounded-2xl text-sm font-bold bg-gradient-to-r from-amber-400 to-orange-500 text-black shadow-lg shadow-amber-500/20 hover:shadow-amber-500/40 transition-all flex items-center justify-center gap-2 mb-5">
                <i data-lucide="plus-circle" class="w-5 h-5"></i> Tambah Produk Baru
            </button>
            <div id="products-list" class="space-y-3">
                <div class="skeleton h-28 rounded-2xl"></div>
                <div class="skeleton h-28 rounded-2xl"></div>
            </div>
        </main>

        <!-- PAGE: PENGATURAN -->
        <main id="page-pengaturan" class="page">
            <div class="glass rounded-3xl p-6 space-y-5">
                <h2 class="text-base font-bold flex items-center gap-2"><i data-lucide="settings" class="w-5 h-5 text-white/50"></i> Pengaturan Toko</h2>
                
                <div class="flex items-center gap-4">
                    <img id="logo-preview" src="https://picsum.photos/id/64/200/200" class="w-20 h-20 rounded-2xl object-cover border-2 border-dashed border-white/20">
                    <div class="flex-1">
                        <label class="text-xs text-white/40 mb-1 block">Logo / Foto Profil</label>
                        <input type="file" id="logo-file" accept="image/*" class="bg-white/5 p-2.5 rounded-xl text-xs file:bg-amber-400 file:text-black file:border-0 file:rounded-lg file:px-3 file:py-1.5 file:mr-2 file:font-bold w-full">
                    </div>
                    <input type="hidden" id="logo-url">
                </div>

                <div>
                    <label class="text-xs text-white/40 mb-1 block">Username Toko</label>
                    <input type="text" id="username-input" placeholder="@tokobudi" class="bg-white/5 p-3.5 rounded-xl w-full text-sm border border-white/10">
                </div>
                <div>
                    <label class="text-xs text-white/40 mb-1 block">Bio / Deskripsi</label>
                    <textarea id="bio-input" rows="2" class="bg-white/5 p-3.5 rounded-xl w-full text-sm border border-white/10 resize-none"></textarea>
                </div>
                <div>
                    <label class="text-xs text-white/40 mb-1 block">Link WhatsApp Utama</label>
                    <input type="text" id="wa-input" placeholder="https://wa.me/62812..." class="bg-white/5 p-3.5 rounded-xl w-full text-sm border border-white/10">
                </div>
                <div>
                    <label class="text-xs text-white/40 mb-1 block">Link Shopee Utama</label>
                    <input type="text" id="shopee-input" placeholder="https://shopee.co.id/..." class="bg-white/5 p-3.5 rounded-xl w-full text-sm border border-white/10">
                </div>
                
                <button id="save-settings-btn" class="w-full py-4 rounded-2xl mt-2 text-sm font-bold bg-white/10 hover:bg-white/20 text-white transition-colors flex items-center justify-center gap-2">
                    <i data-lucide="save" class="w-4 h-4"></i> Simpan Pengaturan
                </button>
            </div>
        </main>
    </div>

    <!-- Modal Overlay (Backdrop Blur) -->
    <div id="product-modal" class="modal fixed inset-0 bg-black/60 backdrop-blur-sm items-center justify-center" style="display:none;">
        <div class="modal-content glass rounded-3xl p-6 w-full max-w-sm m-4 max-h-[90vh] overflow-y-auto border-t-4 border-amber-400">
            <div class="flex justify-between items-center mb-5">
                <h2 id="modal-title" class="text-lg font-bold">Tambah Produk</h2>
                <span class="close-btn cursor-pointer text-white/50 hover:text-white text-3xl leading-none">&times;</span>
            </div>
            <form id="product-form" class="space-y-4">
                <input type="hidden" id="product-id">
                <div>
                    <label class="text-xs text-white/40 mb-1 block">Nama Produk</label>
                    <input type="text" id="product-name" required class="bg-white/5 p-3.5 rounded-xl w-full text-sm border border-white/10">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-xs text-white/40 mb-1 block">Harga</label>
                        <input type="number" id="product-price" required class="bg-white/5 p-3.5 rounded-xl w-full text-sm border border-white/10">
                    </div>
                    <div>
                        <label class="text-xs text-white/40 mb-1 block">Stok</label>
                        <input type="number" id="product-stock" required class="bg-white/5 p-3.5 rounded-xl w-full text-sm border border-white/10">
                    </div>
                </div>
                <div>
                    <label class="text-xs text-white/40 mb-1 block">Deskripsi</label>
                    <textarea id="product-description" rows="2" class="bg-white/5 p-3.5 rounded-xl w-full text-sm border border-white/10 resize-none"></textarea>
                </div>
                <div>
                    <label class="text-xs text-white/40 mb-1 block">Link WA Produk (Opsional)</label>
                    <input type="text" id="product-wa" placeholder="Kosongkan jika pake WA Utama" class="bg-white/5 p-3.5 rounded-xl w-full text-sm border border-white/10">
                </div>
                <div>
                    <label class="text-xs text-white/40 mb-1 block">Link Shopee Produk (Opsional)</label>
                    <input type="text" id="product-shopee" placeholder="Kosongkan jika pake Shopee Utama" class="bg-white/5 p-3.5 rounded-xl w-full text-sm border border-white/10">
                </div>
                <div>
                    <label class="text-xs text-white/40 mb-1 block">Gambar Produk</label>
                    <input type="file" id="product-image-file" accept="image/*" class="bg-white/5 p-2.5 rounded-xl w-full text-xs file:bg-amber-400 file:text-black file:border-0 file:rounded-lg file:px-3 file:py-1.5 file:mr-2 file:font-bold">
                    <input type="hidden" id="product-image-url">
                    <img id="image-preview" src="" alt="Preview" style="display:none;" class="w-24 h-24 object-cover rounded-xl mt-3 border-2 border-dashed border-white/20">
                </div>
                <button type="submit" id="save-product-btn" class="w-full py-4 rounded-2xl mt-2 text-sm font-bold bg-gradient-to-r from-amber-400 to-orange-500 text-black shadow-lg shadow-amber-500/20 flex items-center justify-center gap-2">
                    <i data-lucide="check-circle" class="w-4 h-4"></i> Simpan Produk
                </button>
            </form>
        </div>
    </div>

    <script type="module" src="./js/admin.js"></script>
</body>
</html>
