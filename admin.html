<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Tokobudi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F4F4F4; --card: #FFFFFF; --text: #111111;
      --muted: #777777; --border: #EAEAEA;
      --danger: #EF4444; --accent: #FF6B35;
    }
    html, body { height: 100%; background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); }

    /* LAYOUT */
    .wrapper { display: flex; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar {
      width: 232px; background: var(--card); border-right: 1px solid var(--border);
      position: fixed; top: 0; left: 0; bottom: 0; padding: 18px 12px;
      display: flex; flex-direction: column; z-index: 30;
      transition: transform 0.28s ease; overflow-y: auto;
    }
    .sidebar-logo { font-weight: 800; font-size: 21px; margin-bottom: 24px; padding: 0 6px; }
    .sidebar-logo span { color: var(--accent); }
    .sidebar-menu { display: flex; flex-direction: column; gap: 2px; flex: 1; }
    .tab-btn {
      padding: 11px 12px; border-radius: 10px; cursor: pointer; font-weight: 600;
      font-size: 14px; color: var(--muted); border: none; background: transparent;
      text-align: left; width: 100%; display: flex; align-items: center; gap: 10px;
      transition: all 0.15s; font-family: 'Inter', sans-serif; line-height: 1;
    }
    .tab-btn svg { width: 17px; height: 17px; flex-shrink: 0; }
    .tab-btn:hover { background: var(--bg); color: var(--text); }
    .tab-btn.active-tab { background: var(--text); color: #fff; }
    .tab-btn.logout-btn { color: var(--danger); margin-top: 6px; }
    .tab-btn.logout-btn:hover { background: #FEF2F2; }
    hr.divider { border: none; border-top: 1px solid var(--border); margin: 8px 0; }

    /* OVERLAY */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 25; backdrop-filter: blur(2px); }
    .overlay.show { display: block; }

    /* MAIN */
    .main { margin-left: 232px; flex: 1; display: flex; flex-direction: column; }

    /* MOBILE HEADER */
    .mob-header {
      display: none; padding: 13px 14px; background: var(--card);
      border-bottom: 1px solid var(--border); align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 20;
    }
    .mob-title { font-weight: 800; font-size: 17px; }
    .hamburger {
      width: 38px; height: 38px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--card); display: flex; align-items: center; justify-content: center;
      cursor: pointer; padding: 0;
    }

    /* PAGE CONTAINER */
    .page-wrap { padding: 26px 26px 60px; flex: 1; }
    .page { display: none; }
    .page.show { display: block; animation: fadeUp 0.2s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .page-h { font-size: 20px; font-weight: 800; margin-bottom: 20px; }

    /* CLOCK */
    .clock-box {
      background: var(--text); color: #fff; border-radius: 14px;
      padding: 18px 22px; margin-bottom: 16px;
    }
    .clock-time { font-size: 32px; font-weight: 800; letter-spacing: -1px; font-variant-numeric: tabular-nums; }
    .clock-date { font-size: 12px; opacity: 0.5; margin-top: 4px; }

    /* STATS */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
    .stat { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; }
    .stat-lbl { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .stat-val { font-size: 28px; font-weight: 800; line-height: 1; }
    .stat-val.red { color: var(--danger); }
    .stat-val.sm { font-size: 13px; font-weight: 600; word-break: break-all; }

    /* PRODUK */
    .prod-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; }
    .prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
    .p-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; transition: box-shadow .2s, transform .2s; }
    .p-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,.08); transform: translateY(-2px); }
    .p-img { width: 100%; height: 130px; object-fit: cover; background: var(--bg); display: block; }
    .p-body { padding: 10px 12px 12px; }
    .p-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
    .p-price { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 2px; }
    .p-stock { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
    .p-acts { display: flex; gap: 6px; }
    .p-acts button {
      flex: 1; padding: 7px 0; border-radius: 8px; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: 'Inter', sans-serif; border: 1px solid; transition: all .15s;
    }
    .btn-ed { border-color: var(--border); background: var(--bg); color: var(--text); }
    .btn-ed:hover { background: var(--text); color: #fff; border-color: var(--text); }
    .btn-del { border-color: #FEE2E2; background: #FEF2F2; color: var(--danger); }
    .btn-del:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

    /* SKELETON */
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
    .skel { background: linear-gradient(90deg,var(--bg) 25%,#e0e0e0 50%,var(--bg) 75%); background-size:200% 100%; animation: shimmer 1.4s infinite; border-radius: 10px; }
    .skel-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }

    /* EMPTY */
    .empty { grid-column: 1/-1; text-align: center; padding: 50px 20px; color: var(--muted); }
    .empty svg { width: 44px; height: 44px; margin: 0 auto 12px; display: block; }
    .empty-h { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
    .empty-p { font-size: 13px; }

    /* FORM */
    .f-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 22px; max-width: 520px; }
    .f-group { margin-bottom: 14px; }
    .f-label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; }
    .f-label.red { color: var(--danger); }
    .f-input, .f-area {
      width: 100%; padding: 10px 12px; border-radius: 10px; font-size: 14px;
      border: 1px solid var(--border); background: var(--bg); color: var(--text);
      outline: none; transition: all .15s; font-family: 'Inter', sans-serif;
    }
    .f-input:focus, .f-area:focus { border-color: var(--text); background: #fff; box-shadow: 0 0 0 3px rgba(0,0,0,.05); }
    .f-area { resize: vertical; }
    .f-row { display: flex; gap: 12px; }
    .f-row .f-group { flex: 1; }

    /* LOGO ROW */
    .logo-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    #logo-preview { width: 54px; height: 54px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); flex-shrink: 0; }

    /* BUTTONS */
    .btn {
      padding: 10px 18px; border-radius: 10px; font-weight: 700; font-size: 14px;
      cursor: pointer; border: none; display: inline-flex; align-items: center;
      justify-content: center; gap: 7px; font-family: 'Inter', sans-serif; transition: all .15s;
    }
    .btn-dark { background: var(--text); color: #fff; }
    .btn-dark:hover { opacity: .85; }
    .btn-dark:active { transform: scale(.97); }
    .btn-dark:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .btn-w { width: 100%; }

    /* MODAL */
    .modal-bg {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 50; align-items: flex-end; justify-content: center;
      backdrop-filter: blur(3px);
    }
    .modal-bg.open { display: flex; }
    .modal-box {
      background: #fff; width: 100%; max-width: 500px;
      border-radius: 22px 22px 0 0; padding: 5px 20px 34px;
      max-height: 92vh; overflow-y: auto;
      animation: slideUp .27s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-pull { width: 34px; height: 4px; background: #D1D5DB; border-radius: 2px; margin: 11px auto 17px; cursor: pointer; }
    .modal-h { font-size: 16px; font-weight: 700; margin-bottom: 16px; }

    /* UPLOAD AREA */
    .upload-zone {
      border: 2px dashed var(--border); border-radius: 10px; padding: 20px;
      text-align: center; cursor: pointer; background: var(--bg); color: var(--muted);
      font-size: 13px; font-weight: 500; transition: all .15s;
    }
    .upload-zone:hover { border-color: #999; color: var(--text); background: #ebebeb; }
    #img-preview-wrap { margin-top: 10px; display: none; }
    #img-preview-wrap img { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; border: 1px solid var(--border); }

    /* TOAST */
    #toast {
      position: fixed; top: 18px; left: 50%;
      transform: translateX(-50%) translateY(-120px);
      color: #fff; padding: 10px 20px; border-radius: 50px;
      font-size: 13px; font-weight: 600; z-index: 999;
      box-shadow: 0 6px 20px rgba(0,0,0,.2); white-space: nowrap;
      opacity: 0; pointer-events: none;
      transition: transform .28s ease, opacity .28s ease;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,.15); }
      .main { margin-left: 0; }
      .mob-header { display: flex; }
      .page-wrap { padding: 14px 12px 80px; }
      .prod-grid { grid-template-columns: 1fr 1fr; }
      .f-card { max-width: 100%; }
      .clock-time { font-size: 26px; }
    }
    @media (max-width: 400px) {
      .prod-grid { grid-template-columns: 1fr; }
      .f-row { flex-direction: column; gap: 0; }
    }
  </style>
</head>
<body>

  <!-- OVERLAY -->
  <div id="overlay" class="overlay"></div>

  <div class="wrapper">

    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-logo">Tokobudi<span>.</span></div>
      <div class="sidebar-menu">
        <button class="tab-btn active-tab" data-tab="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </button>
        <button class="tab-btn" data-tab="products">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          Produk
        </button>
        <button class="tab-btn" data-tab="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          Pengaturan Toko
        </button>
        <button class="tab-btn" data-tab="account">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Akun Saya
        </button>
        <hr class="divider">
        <button class="tab-btn logout-btn" id="btn-logout">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Keluar
        </button>
      </div>
    </nav>

    <!-- MAIN -->
    <div class="main">

      <!-- MOBILE HEADER -->
      <div class="mob-header">
        <div class="mob-title">Tokobudi<span style="color:var(--accent)">.</span></div>
        <button class="hamburger" id="btn-hamburger">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="page-wrap">

        <!-- DASHBOARD -->
        <div id="tab-dashboard" class="page show">
          <div class="clock-box">
            <div class="clock-time" id="clock-time">--:--:--</div>
            <div class="clock-date" id="clock-date">Memuat...</div>
          </div>
          <div class="stats">
            <div class="stat">
              <div class="stat-lbl">Total Produk</div>
              <div class="stat-val" id="stat-total">-</div>
            </div>
            <div class="stat">
              <div class="stat-lbl">Stok Habis</div>
              <div class="stat-val red" id="stat-empty">-</div>
            </div>
            <div class="stat">
              <div class="stat-lbl">Admin</div>
              <div class="stat-val sm" id="admin-email">...</div>
            </div>
          </div>
        </div>

        <!-- PRODUK -->
        <div id="tab-products" class="page">
          <div class="prod-header">
            <h2 class="page-h" style="margin:0">Daftar Produk</h2>
            <button class="btn btn-dark" id="btn-add-product">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Tambah Produk
            </button>
          </div>
          <div class="prod-grid" id="products-list">
            <div class="skel-card"><div class="skel" style="height:130px;border-radius:14px 14px 0 0"></div><div style="padding:10px 12px"><div class="skel" style="height:12px;width:70%;margin-bottom:7px"></div><div class="skel" style="height:13px;width:45%"></div></div></div>
            <div class="skel-card"><div class="skel" style="height:130px;border-radius:14px 14px 0 0"></div><div style="padding:10px 12px"><div class="skel" style="height:12px;width:55%;margin-bottom:7px"></div><div class="skel" style="height:13px;width:40%"></div></div></div>
            <div class="skel-card"><div class="skel" style="height:130px;border-radius:14px 14px 0 0"></div><div style="padding:10px 12px"><div class="skel" style="height:12px;width:80%;margin-bottom:7px"></div><div class="skel" style="height:13px;width:50%"></div></div></div>
          </div>
        </div>

        <!-- SETTINGS -->
        <div id="tab-settings" class="page">
          <h2 class="page-h">Pengaturan Toko</h2>
          <div class="f-card">
            <div class="f-group">
              <label class="f-label">Nama Toko</label>
              <input type="text" id="inp-username" class="f-input" placeholder="Nama toko kamu...">
            </div>
            <div class="f-group">
              <label class="f-label">Deskripsi (Bio)</label>
              <textarea id="inp-bio" class="f-area" rows="3" placeholder="Ceritakan tentang toko kamu..."></textarea>
            </div>
            <div class="f-group">
              <label class="f-label">Link WhatsApp Utama</label>
              <input type="text" id="inp-wa" class="f-input" placeholder="https://wa.me/628...">
            </div>
            <div class="f-group">
              <label class="f-label">Link Shopee Utama</label>
              <input type="text" id="inp-shopee" class="f-input" placeholder="https://shopee.co.id/...">
            </div>
            <div class="f-group">
              <label class="f-label">Logo Toko</label>
              <div class="logo-row">
                <img id="logo-preview" src="https://placehold.co/200x200/F3F4F6/999?text=Logo" alt="Logo">
                <button type="button" id="btn-logo-pick" class="btn btn-dark" style="font-size:13px;padding:8px 14px;">Pilih Foto</button>
                <input type="file" id="inp-logo-file" accept="image/*" style="display:none">
                <input type="hidden" id="inp-logo-url">
              </div>
            </div>
            <button class="btn btn-dark btn-w" id="btn-save-settings" style="margin-top:10px;">Simpan Pengaturan</button>
          </div>
        </div>

        <!-- AKUN -->
        <div id="tab-account" class="page">
          <h2 class="page-h">Keamanan Akun</h2>
          <div class="f-card">
            <div class="f-group">
              <label class="f-label">Email Baru</label>
              <input type="email" id="inp-new-email" class="f-input">
            </div>
            <div class="f-group">
              <label class="f-label">Password Baru <small style="color:var(--muted);font-weight:400">(kosong = tidak ganti)</small></label>
              <input type="password" id="inp-new-pass" class="f-input" placeholder="Min 6 karakter">
            </div>
            <div class="f-group">
              <label class="f-label red">Password Lama (wajib untuk verifikasi)</label>
              <input type="password" id="inp-old-pass" class="f-input" placeholder="Password lama kamu">
            </div>
            <button class="btn btn-dark btn-w" id="btn-save-account" style="margin-top:10px;">Update Akun</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- MODAL PRODUK -->
  <div id="product-modal" class="modal-bg">
    <div class="modal-box">
      <div class="modal-pull" id="modal-pull"></div>
      <div class="modal-h" id="modal-title">Tambah Produk</div>
      <form id="product-form">
        <input type="hidden" id="inp-prod-id">
        <div class="f-group">
          <label class="f-label">Nama Produk *</label>
          <input type="text" id="inp-prod-name" class="f-input" required placeholder="Nama produk...">
        </div>
        <div class="f-row">
          <div class="f-group">
            <label class="f-label">Harga (Rp) *</label>
            <input type="number" id="inp-prod-price" class="f-input" required min="0" placeholder="0">
          </div>
          <div class="f-group">
            <label class="f-label">Stok *</label>
            <input type="number" id="inp-prod-stock" class="f-input" required min="0" placeholder="0">
          </div>
        </div>
        <div class="f-group">
          <label class="f-label">Deskripsi</label>
          <textarea id="inp-prod-desc" class="f-area" rows="2" placeholder="Deskripsi singkat..."></textarea>
        </div>
        <div class="f-group">
          <label class="f-label">Link Shopee Produk <small style="color:var(--muted);font-weight:400">(opsional)</small></label>
          <input type="text" id="inp-prod-shopee" class="f-input" placeholder="https://shopee.co.id/...">
        </div>
        <div class="f-group">
          <label class="f-label">Link WA Khusus <small style="color:var(--muted);font-weight:400">(opsional, pakai WA utama jika kosong)</small></label>
          <input type="text" id="inp-prod-wa" class="f-input" placeholder="https://wa.me/628...">
        </div>
        <div class="f-group">
          <label class="f-label">Foto Produk *</label>
          <input type="hidden" id="inp-prod-img">
          <div class="upload-zone" id="upload-zone">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:block;margin:0 auto 7px;opacity:.4"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Klik untuk pilih foto
          </div>
          <input type="file" id="inp-prod-file" accept="image/*" style="display:none">
          <div id="img-preview-wrap">
            <img id="img-preview" src="" alt="Preview">
          </div>
        </div>
        <button type="submit" id="btn-save-product" class="btn btn-dark btn-w">Simpan Produk</button>
      </form>
    </div>
  </div>

  <div id="toast"></div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
