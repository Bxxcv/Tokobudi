<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINKify Admin: Manajemen User</title>
  <link rel="icon" type="image/png" sizes="32x32" href="logo-linkify.png">
  <link rel="stylesheet" href="css/admin-daftar.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'lf-dark': '#1A1D21',
            'lf-orange': '#EE4D2D',
            'lf-orange-hover': '#D74121',
          },
          boxShadow: {
            'card': '0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1)',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50">

  <div id="overlay" class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden md:hidden" onclick="closeSidebar()"></div>

  <div class="flex h-screen overflow-hidden">
    <aside id="sidebar" class="bg-lf-dark text-slate-300 w-64 space-y-6 py-6 px-3 fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out z-30">
      <div class="flex items-center space-x-3 px-3">
        <img src="logo-linkify.png" alt="LF" class="w-8 h-8 rounded">
        <span class="text-xl font-bold text-white">LINKify</span>
      </div>
      <nav class="space-y-1">
        <a href="admin.html" onclick="closeSidebar()" class="flex items-center py-2.5 px-3 rounded-lg transition duration-200 hover:bg-slate-700 hover:text-white">
          <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
          Dashboard
        </a>
        <a href="admin-daftar.html" onclick="closeSidebar()" class="flex items-center py-2.5 px-3 rounded-lg bg-lf-orange text-white">
          <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
          Manajemen User
        </a>
      </nav>
      <div class="absolute bottom-4 w-56">
        <a href="#" onclick="logoutAdmin()" class="flex items-center py-2.5 px-3 rounded-lg transition duration-200 hover:bg-slate-700 hover:text-white">
          <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
          Logout
        </a>
      </div>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">
      <header class="bg-white shadow-sm border-b border-slate-200">
        <div class="flex items-center justify-between px-4 py-3">
          <div class="flex items-center">
            <button type="button" id="hamburger" class="md:hidden mr-3 text-slate-600">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <h1 class="text-lg font-semibold text-slate-800">Manajemen User</h1>
          </div>
          <div id="jam" class="text-sm font-medium text-slate-600 bg-slate-100 px-3 py-1 rounded-full">--:-- WIB</div>
        </div>
      </header>

      <main class="flex-1 overflow-x-hidden overflow-y-auto p-4 md:p-6">

        <div id="loginAdmin">
          <div class="bg-white p-6 rounded-xl shadow-card w-full max-w-md mx-auto mt-10">
            <h2 class="text-2xl font-bold mb-4 text-center text-slate-800">Login Admin</h2>
            <input id="adminEmail" type="email" autocomplete="email" placeholder="Email Admin" class="w-full p-3 border border-slate-300 rounded-lg mb-3 focus:ring-2 focus:ring-lf-orange focus:border-lf-orange">
            <input id="adminPass" type="password" autocomplete="current-password" placeholder="Password Admin" class="w-full p-3 border border-slate-300 rounded-lg mb-4 focus:ring-2 focus:ring-lf-orange focus:border-lf-orange">
            <button type="button" onclick="loginAdmin()" class="w-full bg-lf-orange text-white p-3 rounded-lg font-semibold hover:bg-lf-orange-hover transition">Login Admin</button>
            <p id="loginError" class="text-red-500 text-sm text-center mt-3 hidden"></p>
          </div>
        </div>

        <div id="formDaftar" style="display:none;">
          <p class="mb-6 text-sm text-slate-600">Login sebagai: <span id="adminYgLogin" class="font-semibold text-lf-orange"></span></p>

          <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 mb-6">
            <div class="bg-white p-5 rounded-xl shadow-card border border-slate-100">
              <div class="flex items-center justify-between">
                <div>
                  <p class="text-sm text-slate-500">Total User</p>
                  <p id="totalUser" class="text-2xl font-bold text-slate-800 mt-1">0</p>
                </div>
                <div class="bg-blue-100 p-3 rounded-lg">
                  <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                </div>
              </div>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-card border border-slate-100">
              <div class="flex items-center justify-between">
                <div>
                  <p class="text-sm text-slate-500">Total Omset</p>
                  <p id="totalOmset" class="text-2xl font-bold text-slate-800 mt-1">Rp 0</p>
                </div>
                <div class="bg-green-100 p-3 rounded-lg">
                  <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
              </div>
              <p class="text-xs text-slate-400 mt-2">*Manual, update dari transaksi</p>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-card border border-slate-100">
              <div class="flex items-center justify-between">
                <div>
                  <p class="text-sm text-slate-500">User Aktif</p>
                  <p id="totalAktif" class="text-2xl font-bold text-green-600 mt-1">0</p>
                </div>
                <div class="bg-lf-orange/10 p-3 rounded-lg">
                  <svg class="w-6 h-6 text-lf-orange" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
              </div>
            </div>
          </div>

          <div class="bg-white p-5 md:p-6 rounded-xl shadow-card mb-6 border border-slate-100">
            <h2 class="text-lg font-semibold mb-4 text-slate-800">Tambah User/Toko Baru</h2>
            <div class="grid grid-cols-1 lg:grid-cols-5 gap-3">
              <input id="namaToko" type="text" placeholder="Nama Toko" class="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-lf-orange focus:border-lf-orange">
              <input id="namaPemilik" type="text" placeholder="Nama Pemilik" class="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-lf-orange focus:border-lf-orange">
              <input id="emailUser" type="email" placeholder="Email User Baru" class="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-lf-orange focus:border-lf-orange">
              <input id="passUser" type="password" placeholder="Password (min 6)" class="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-lf-orange focus:border-lf-orange">
              <button type="button" onclick="daftarkanUser()" id="btnDaftar" class="bg-lf-orange text-white px-4 py-2.5 rounded-lg font-semibold hover:bg-lf-orange-hover transition disabled:opacity-50">+ Daftarkan</button>
            </div>
          </div>

          <div class="bg-white rounded-xl shadow-card border border-slate-100">
            <div class="p-5 md:p-6 border-b border-slate-100 flex items-center justify-between">
              <h2 class="text-lg font-semibold text-slate-800">List User Terdaftar</h2>
              <button type="button" onclick="ambilDataUser()" class="text-sm text-lf-orange hover:underline font-medium">↻ Refresh</button>
            </div>
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead class="bg-slate-50 text-slate-600">
                  <tr>
                    <th class="p-3 text-left font-medium">No</th>
                    <th class="p-3 text-left font-medium">Nama Toko</th>
                    <th class="p-3 text-left font-medium">Pemilik</th>
                    <th class="p-3 text-left font-medium">Email</th>
                    <th class="p-3 text-left font-medium">Omset</th>
                    <th class="p-3 text-left font-medium">Status</th>
                    <th class="p-3 text-left font-medium">Paket</th>
                    <th class="p-3 text-left font-medium">Aksi</th>
                  </tr>
                </thead>
                <tbody id="tabelUser" class="divide-y divide-slate-100">
                  <tr><td colspan="8" class="text-center p-6 text-slate-500">Loading data...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script type="module" src="js/admin-daftar.js"></script>
</body>
</html>
