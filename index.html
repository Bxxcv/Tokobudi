<html lang="id">
<head>

  <title>Tokobudi - Link Bio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta property="og:title" content="Tokobudi - Link Bio">
  <meta property="og:description" content="Link Bio Toko Online Terpercaya">
  <meta property="og:image" content="https://picsum.photos/id/64/200/200">

<body class="w-full px-4 py-6 text-base">
  <div class="max-w-2xl mx-auto">
    <!-- Top Bar (Dark Mode Dihapus) -->
    <div class="flex justify-end items-center mb-8">
      <button onclick="shareLink()" class="earth-card p-3 rounded-xl hover:bg-stone-100 transition-colors text-stone-600">
        <i data-lucide="share-2" class="lucide"></i>
      </button>
    </div>

    <!-- Profile Header Earthy -->
    <header class="text-center mb-10">
      <div class="w-28 h-28 mx-auto mb-5 p-1.5 rounded-full bg-stone-200 shadow-inner">
        <img id="profileImg" src="https://picsum.photos/id/64/200/200" class="w-full h-full rounded-full object-cover border-4 border-[#F9F6F1]">
      </div>
      <h1 id="username" class="text-3xl font-extrabold tracking-tight text-[#3E2723]">@tokobudi</h1>
      <p id="bio" class="text-[#8D6E63] mt-2 text-sm max-w-xs mx-auto leading-relaxed">Loading...</p>
      
      <div class="flex justify-center gap-3 mt-5">
        <a id="shopeeBtn" href="#" target="_blank" class="w-12 h-12 earth-card rounded-full flex items-center justify-center hover:bg-orange-50 hover:text-orange-600 transition-colors hidden text-stone-600">
          <i data-lucide="shopping-bag" class="lucide w-5 h-5"></i>
        </a>
      </div>
    </header>

    <div id="productList" class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
      <div class="skeleton h-80 rounded-2xl"></div>
      <div class="skeleton h-80 rounded-2xl hidden sm:block"></div>
    </div>

    <footer class="text-center border-t border-stone-200 pt-6 mt-10 pb-24">
      <p class="text-stone-400 text-xs font-medium tracking-widest uppercase">Powered by Tokobudi</p>
    </footer>
  </div>
