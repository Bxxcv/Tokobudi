<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINKify - Link Bio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/index.css">
  <link rel="icon" type="image/png" sizes="32x32" href="logo-linkify.png">
  <link rel="apple-touch-icon" href="logo-linkify.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FF6B35">
</head>
<body class="index-page">
<div class="page-wrap">

  <div class="container">

    <div class="top-bar">
      <div class="theme-switcher" id="themeSwitcher">
        <button type="button" class="theme-pill active" data-t="dark" onclick="setTheme('dark')" title="Midnight">
          <span class="theme-pill-icon">🌙</span>
          <span class="theme-pill-label">Midnight</span>
        </button>
        <button type="button" class="theme-pill" data-t="white" onclick="setTheme('white')" title="White">
          <span class="theme-pill-icon">☀️</span>
          <span class="theme-pill-label">White</span>
        </button>
      </div>
      <button type="button" onclick="shareLink()" class="share-btn" aria-label="Bagikan">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
          <polyline points="16 6 12 2 8 6"/>
          <line x1="12" y1="2" x2="12" y2="15"/>
        </svg>
      </button>
    </div>

    <div class="hero fade-up">
      <div class="logo-wrapper">
        <img id="profileImg" src="https://placehold.co/200x200/1a1a2e/ffffff?text=Logo" alt="Logo Toko" class="logo-img" loading="eager" decoding="async">
      </div>
      <h1 id="username" class="store-name">Loading...</h1>
      <p id="bio" class="store-desc"></p>
    </div>

    <div class="platform-section fade-up">
      <div class="section-header">
        <span class="section-title">Pemesanan &amp; Platform</span>
      </div>
      <a id="link-wa-main" href="#" target="_blank" rel="noopener noreferrer" class="platform-btn wa-btn">
        <div class="icon-box">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="white" aria-hidden="true"><use href="#ico-wa"/></svg>
        </div>
        Pesan Lewat WhatsApp
      </a>
      <a id="link-shopee" href="#" target="_blank" rel="noopener noreferrer" class="platform-btn shopee-btn hidden">
        <div class="icon-box">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="white" aria-hidden="true"><use href="#ico-shopee"/></svg>
        </div>
        Pesan Lewat Shopee
      </a>
      <a id="link-tokped" href="#" target="_blank" rel="noopener noreferrer" class="platform-btn tokped-btn">
        <div class="icon-box">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="white" aria-hidden="true"><use href="#ico-tokped"/></svg>
        </div>
        Pesan Lewat Tokopedia
      </a>
    </div>

    <div class="catalog-section">
      <div class="section-header">
        <span class="section-title">Katalog Produk</span>
      </div>
      <div id="productList" class="product-grid">
        <div class="skeleton-box">
          <div class="skeleton" style="height:160px;border-radius:16px 16px 0 0;"></div>
          <div style="padding:12px;">
            <div class="skeleton" style="height:13px;width:80%;margin-bottom:8px;"></div>
            <div class="skeleton" style="height:18px;width:50%;"></div>
          </div>
        </div>
        <div class="skeleton-box">
          <div class="skeleton" style="height:160px;border-radius:16px 16px 0 0;"></div>
          <div style="padding:12px;">
            <div class="skeleton" style="height:13px;width:65%;margin-bottom:8px;"></div>
            <div class="skeleton" style="height:18px;width:45%;"></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <footer class="footer">
    <p id="footer-store">© 2025 My Store</p>
    <div class="footer-brand">
      <img src="logo-linkify.png" alt="LINKify" loading="lazy" decoding="async">
      Powered by LINKify
    </div>
    <p class="footer-copy">© 2025 LINKify. All rights reserved.</p>
  </footer>

</div>

<a id="waBtn" href="#" target="_blank" rel="noopener noreferrer" data-wa="" class="floating-wa" aria-label="WhatsApp">
  <svg viewBox="0 0 24 24" width="28" height="28" fill="white" aria-hidden="true"><use href="#ico-wa"/></svg>
</a>

<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
  <defs>

    </symbol>
    <symbol id="ico-shopee" viewBox="0 0 24 24">
      <path d="M19.793 7.507c0-2.075-.828-3.952-2.168-5.308a.675.675 0 00-.95-.014.664.664 0 00-.013.944 6.506 6.506 0 011.8 4.378 6.501 6.501 0 01-6.504 6.487 6.499 6.499 0 01-6.5-6.487 6.497 6.497 0 011.8-4.378.664.664 0 00-.013-.944.675.675 0 00-.95.014A7.824 7.824 0 004.127 7.507c0 .332.022.659.063.98H2.672a1.354 1.354 0 00-1.348 1.214L.024 21.347A1.344 1.344 0 001.37 22.86h21.26a1.344 1.344 0 001.346-1.513l-1.3-11.626a1.354 1.354 0 00-1.348-1.214h-1.597a7.9 7.9 0 00.062-.98zM12 1.14a2.694 2.694 0 110 5.388A2.694 2.694 0 0112 1.14z"/>
    </symbol>
    <symbol id="ico-tokped" viewBox="0 0 24 24">
      <path d="M21 7H3a1 1 0 00-1 1v11a2 2 0 002 2h16a2 2 0 002-2V8a1 1 0 00-1-1zm-9 9a3 3 0 110-6 3 3 0 010 6z"/>
      <path d="M8 7V5a4 4 0 018 0v2"/>
    </symbol>
  </defs>
</svg>

<script>
  function setTheme(t) {
    document.body.setAttribute('data-theme', t);
    localStorage.setItem('lf-theme', t);
    document.querySelectorAll('.theme-pill').forEach(d => {
      d.classList.toggle('active', d.dataset.t === t);
    });
  }
  const _validThemes = ['dark', 'white'];
  const _saved = localStorage.getItem('lf-theme');
  setTheme(_validThemes.includes(_saved) ? _saved : 'dark');

  window.shareLink = () => {
    const title = document.getElementById('username')?.innerText || 'Toko';
    if (navigator.share) {
      navigator.share({ title, url: window.location.href });
    } else {
      navigator.clipboard.writeText(window.location.href)
        .then(() => alert('Link berhasil disalin!'))
        .catch(() => alert('Gagal menyalin link.'));
    }
  };
</script>

<script type="module" src="js/script.js"></script>
</body>
</html>
