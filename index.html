<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINKify - Link Bio</title>
  <meta name="description" content="Toko online premium — belanja mudah, pesan via WhatsApp">
  <meta property="og:title" content="LINKify - Toko Online">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/index.css">
  <link rel="icon" type="image/png" sizes="32x32" href="logo-linkify.png">
  <link rel="apple-touch-icon" href="logo-linkify.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FF6B35">
</head>
<body class="index-page">
<div class="page-wrap">
  <div class="container">

    <!-- TOP BAR -->
    <div class="top-bar">
      <button type="button" onclick="shareLink()" class="share-btn" aria-label="Bagikan toko">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/>
          <polyline points="16 6 12 2 8 6"/>
          <line x1="12" y1="2" x2="12" y2="15"/>
        </svg>
      </button>
    </div>

    <!-- HERO -->
    <div class="hero fade-up">
      <div class="logo-wrapper">
        <img id="profileImg" src="https://placehold.co/200x200/111/333?text=+" alt="Logo Toko" class="logo-img" loading="lazy" decoding="async">
      </div>
      <h1 id="username" class="store-name">
        <span class="skel-text" style="width:140px;height:22px;display:inline-block;"></span>
      </h1>
      <div id="verified-badge" class="verified-badge" style="display:none;" aria-label="Terverifikasi Premium">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true" width="13" height="13">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
        Terverifikasi
      </div>
      <p id="bio" class="store-desc"></p>
    </div>

    <!-- SOCIAL -->
    <div class="social-section fade-up" id="social-bar" style="display:none;">
      <div id="social-icons" class="social-icons"></div>
    </div>

    <!-- PLATFORM BUTTONS -->
    <div class="platform-section fade-up">
      <a id="link-wa-main" href="#" target="_blank" rel="noopener noreferrer" class="platform-btn wa-btn" onclick="trackClick('wa')">
        <div class="icon-box">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="white" aria-hidden="true"><use href="#ico-wa"/></svg>
        </div>
        <span>Pesan via WhatsApp</span>
        <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" width="14" height="14"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
      <a id="link-shopee" href="#" target="_blank" rel="noopener noreferrer" class="platform-btn shopee-btn hidden" onclick="trackClick('shopee')">
        <div class="icon-box">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="white" aria-hidden="true"><use href="#ico-shopee"/></svg>
        </div>
        <span>Pesan via Shopee</span>
        <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" width="14" height="14"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
      <a id="link-tokped" href="#" target="_blank" rel="noopener noreferrer" class="platform-btn tokped-btn hidden">
        <div class="icon-box">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="white" aria-hidden="true"><use href="#ico-tokped"/></svg>
        </div>
        <span>Pesan via Tokopedia</span>
        <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" width="14" height="14"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
    </div>

    <!-- CUSTOM BUTTONS (Premium) -->
    <div id="custom-buttons-section" class="platform-section" style="display:none;">
      <div class="custom-btn-wrap"></div>
    </div>

    <!-- GALLERY BUTTON (Premium) -->
    <div id="gallery-btn-wrap" style="display:none;" class="fade-up">
      <a id="gallery-btn" href="gallery.html" class="gallery-link-btn">
        <div class="gallery-btn-previews" id="gallery-previews"></div>
        <div class="gallery-btn-text">
          <span class="gallery-btn-label">Gallery Foto</span>
          <span class="gallery-btn-count" id="gallery-count"></span>
        </div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16" height="16"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
    </div>

    <!-- CATALOG -->
    <div class="catalog-section">
      <div class="section-header fade-up">
        <span class="section-title">Katalog Produk</span>
      </div>
      <div id="kategori-filter" class="kategori-filter" style="display:none;"></div>
      <div id="unggulan-section" style="display:none;">
        <div class="unggulan-label">Produk Unggulan</div>
        <div id="unggulanList" class="product-grid" style="margin-bottom:20px;"></div>
        <div class="unggulan-divider"></div>
        <div class="unggulan-label" style="margin-top:16px;">Semua Produk</div>
      </div>
      <div id="productList" class="product-grid">
        <!-- Skeleton -->
        <div class="skeleton-box">
          <div class="skeleton" style="aspect-ratio:4/3;border-radius:0;"></div>
          <div style="padding:12px 12px 14px;">
            <div class="skeleton" style="height:12px;width:75%;margin-bottom:8px;border-radius:6px;"></div>
            <div class="skeleton" style="height:16px;width:48%;border-radius:6px;"></div>
          </div>
        </div>
        <div class="skeleton-box">
          <div class="skeleton" style="aspect-ratio:4/3;border-radius:0;"></div>
          <div style="padding:12px 12px 14px;">
            <div class="skeleton" style="height:12px;width:60%;margin-bottom:8px;border-radius:6px;"></div>
            <div class="skeleton" style="height:16px;width:52%;border-radius:6px;"></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <footer class="footer">
    <p id="footer-store" class="footer-copy-text">© 2025 My Store</p>
    <div class="footer-brand">
      <img src="logo-linkify.png" alt="LINKify" loading="lazy" decoding="async" width="14" height="14">
      Powered by LINKify
    </div>
  </footer>
</div>

<!-- Floating WA -->
<a id="waBtn" href="#" target="_blank" rel="noopener noreferrer" data-wa="" class="floating-wa" aria-label="Chat WhatsApp" onclick="trackClick('wa')">
  <svg viewBox="0 0 24 24" width="26" height="26" fill="white" aria-hidden="true"><use href="#ico-wa"/></svg>
</a>

<script>
  window.shareLink = () => {
    const title = document.getElementById('username')?.innerText || 'Toko';
    if (navigator.share) {
      navigator.share({ title, url: window.location.href }).catch(() => {});
    } else {
      navigator.clipboard.writeText(window.location.href)
        .then(() => {
          const btn = document.querySelector('.share-btn');
          if (btn) {
            btn.style.background = 'rgba(16,185,129,0.15)';
            btn.style.borderColor = 'rgba(16,185,129,0.3)';
            setTimeout(() => { btn.style.background = ''; btn.style.borderColor = ''; }, 1400);
          }
        }).catch(() => {});
    }
  };
</script>

<script type="module">
  import { checkMaintenance } from './js/maintenance.js';
  await checkMaintenance();
</script>
<script type="module" src="js/script.js"></script>
</body>
</html>
