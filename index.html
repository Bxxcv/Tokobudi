<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tokobudi - Link Bio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta property="og:title" content="Tokobudi - Link Bio">
  <meta property="og:description" content="Link Bio">
  <meta property="og:type" content="website">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #16213e 100%);
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      color: #ffffff;
      overflow-x: hidden;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 16px 100px;
    }

    .hidden { display: none !important; }

    /* ANIMATIONS */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes rotateBorder {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .hero { animation: fadeInUp 0.6s ease forwards; }
    .platform-section { animation: fadeInUp 0.6s ease 0.2s both; }
    .catalog-section { animation: fadeInUp 0.6s ease 0.4s both; }

    /* GLASSMORPHISM */
    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
    }

    /* TOP BAR */
    .top-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 24px;
    }
    .share-btn {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 14px;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .share-btn:active { transform: scale(0.9); }

    /* HERO SECTION */
    .hero { text-align: center; margin-bottom: 32px; }
    .logo-wrapper {
      width: 130px; height: 130px;
      border-radius: 50%;
      padding: 4px;
      background: linear-gradient(270deg, #FF6B35, #FFD700, #FF6B35);
      background-size: 400% 400%;
      animation: rotateBorder 3s ease infinite;
      margin: 0 auto 20px;
      box-shadow: 0 10px 30px rgba(255, 107, 53, 0.2);
    }
    .logo-img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #1a1a2e;
      animation: float 3s ease-in-out infinite;
      background-color: #16213e;
    }
    .store-name {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 8px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
      text-transform: lowercase;
    }
    .store-desc {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      line-height: 1.5;
      max-width: 320px;
      margin: 0 auto;
    }

    /* SECTION HEADERS */
    .section-header {
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.5);
      display: block;
    }
    .section-title::after {
      content: '';
      display: block;
      width: 40px;
      height: 3px;
      background: linear-gradient(90deg, #FF6B35, #FFD700);
      border-radius: 2px;
      margin-top: 8px;
    }

    /* PLATFORM BUTTONS */
    .platform-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 16px 20px;
      border-radius: 16px;
      border: none;
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 12px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      position: relative;
      overflow: hidden;
    }
    .platform-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.35);
    }
    .platform-btn:active {
      transform: translateY(-1px);
    }
    .platform-btn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }
    .platform-btn:hover::after {
      left: 150%;
    }
    .wa-btn { background: linear-gradient(135deg, #25D366, #128C7E); }
    .shopee-btn { background: linear-gradient(135deg, #EE4D2D, #FF6633); }
    .tokped-btn { background: linear-gradient(135deg, #03AC0E, #028a0b); }
    
    .icon-box {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* CATALOG SECTION */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .product-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      text-decoration: none;
      color: white;
    }
    .product-card:hover {
      transform: scale(1.03);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }
    .product-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background-color: #1a1a2e;
    }
    .product-info {
      padding: 12px;
    }
    .product-name {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .product-price {
      font-size: 15px;
      font-weight: 700;
      color: #FF6B35;
      background: rgba(255, 107, 53, 0.1);
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
    }
    .out-of-stock {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
    }

    /* SKELETON LOADERS */
    .skeleton-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; overflow: hidden; }
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0.05) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }

    /* FOOTER */
    .footer {
      text-align: center;
      padding-top: 24px;
      margin-top: 32px;
      border-top: 1px solid rgba(255,255,255,0.05);
      font-size: 12px;
      color: rgba(255,255,255,0.3);
    }
    .powered {
      font-size: 10px;
      margin-top: 8px;
      opacity: 0.5;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* FLOATING WA */
    .floating-wa {
      position: fixed;
      bottom: 24px; right: 24px;
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #25D366, #128C7E);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4);
      z-index: 99;
      transition: transform 0.2s;
    }
    .floating-wa:active { transform: scale(0.9); }
  </style>
</head>

          <div class="skeleton" style="height: 160px; border-radius: 16px 16px 0 0;"></div>

            <div class="skeleton" style="height: 14px; width: 60%; margin-bottom: 8px;"></div>
            <div class="skeleton" style="height: 20px; width: 40%;"></div>

    <!-- FOOTER -->
    <div class="footer">
